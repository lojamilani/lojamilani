<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Milani</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fff5f8;
}

/* HEADER */
header {
  background: linear-gradient(90deg,#ffcc00,#ff4da6);
  padding: 15px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: white;
}

.logo {
  font-size: 28px;
  font-weight: 700;
}

nav button {
  background: white;
  border: none;
  padding: 8px 15px;
  margin: 0 5px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.3s;
}

nav button:hover {
  background: #ff4da6;
  color: white;
}

/* BANNER */
.banner {
  background: linear-gradient(45deg,#ffcc00,#ff4da6);
  color: white;
  text-align: center;
  padding: 80px 20px;
  animation: fadeIn 1.5s ease-in-out;
}

.banner h1 {
  font-size: 45px;
  margin: 0;
}

.banner p {
  font-size: 18px;
  margin-top: 10px;
}

/* PRODUTOS */
.produtos {
  padding: 40px;
  text-align: center;
}

.produtos h2 {
  margin-bottom: 30px;
}

.catalogo {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.produto {
  background: white;
  width: 250px;
  margin: 15px;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.produto:hover {
  transform: scale(1.05);
}

.produto img {
  width: 100%;
  border-radius: 15px 15px 0 0;
}

.produto h3 {
  margin: 10px 0 5px;
}

.produto p {
  color: #ff4da6;
  font-weight: bold;
}

.produto button {
  background: #ffcc00;
  border: none;
  padding: 10px 20px;
  margin-bottom: 15px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}

/* ANIMAÇÃO */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

footer {
  text-align: center;
  padding: 20px;
  background: #ff4da6;
  color: white;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <div class="logo">💛 Loja Milani 🌸</div>
  <nav>
    <button>Masculino</button>
    <button>Feminino</button>
    <button>Promoção</button>
  </nav>
</header>

<section class="banner">
  <h1>Bem-vindo à Loja Milani</h1>
  <p>Estilo, qualidade e preço justo em um só lugar!</p>
</section>

<section class="produtos">
  <h2>Catálogo</h2>

  <div class="catalogo">

    <div class="produto">
      <img src="https://via.placeholder.com/250x250" alt="">
      <h3>Camiseta Masculina</h3>
      <p>R$ 79,90</p>
      <button onclick="window.open('https://wa.me/5551992921991')">Comprar</button>
    </div>

    <div class="produto">
      <img src="https://via.placeholder.com/250x250" alt="">
      <h3>Vestido Feminino</h3>
      <p>R$ 129,90</p>
      <button onclick="window.open('https://wa.me/5551992921991')">Comprar</button>
    </div>

    <div class="produto">
      <img src="https://via.placeholder.com/250x250" alt="">
      <h3>Perfume Importado</h3>
      <p>R$ 199,90</p>
      <button onclick="window.open('https://wa.me/5551992921991')">Comprar</button>
    </div>

  </div>
</section>

<a class="whatsapp" href="https://wa.me/5551992921991" target="_blank">💬</a>

<footer>
  © 2026 Loja Milani - Todos os direitos reservados
</footer>

</body>
</html>

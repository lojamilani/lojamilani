<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Milani - Profissional</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#fff;color:#333;}

/* HEADER */
header{background:#000;padding:20px;text-align:center;}
.logo{font-size:42px;font-weight:800;letter-spacing:2px;background:linear-gradient(45deg,#FFC300,#FF4FA3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header p{color:#FFC300;font-size:14px;letter-spacing:2px;margin-top:5px;}

/* NAVIGATION */
nav{background:#111;padding:15px;text-align:center;}
nav a{color:#fff;text-decoration:none;margin:0 12px;font-weight:600;transition:0.3s;}
nav a:hover{color:#FF4FA3;}

/* BANNER CARROSSEL */
.banner-carousel{position:relative;width:100%;height:400px;overflow:hidden;border-radius:15px;margin:20px 0;}
.banner-carousel img{width:100%;height:100%;object-fit:cover;position:absolute;opacity:0;transition:opacity 1s;}
.banner-carousel img.active{opacity:1;}
.banner-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;text-shadow:2px 2px 8px #000;}
.banner-text h2{font-size:40px;font-weight:800;margin-bottom:10px;}
.banner-text p{font-size:18px;margin-bottom:15px;}
.banner-text .btn{background:#000;color:#fff;padding:12px 30px;border-radius:30px;text-decoration:none;font-weight:600;transition:0.3s;}
.banner-text .btn:hover{background:#fff;color:#000;}

/* PRODUTOS */
.section{padding:40px 20px;text-align:center;}
.section h3{font-size:30px;margin-bottom:30px;font-weight:800;}
.produtos{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;}
.card{width:260px;padding:15px;border-radius:20px;background:#f9f9f9;transition:0.3s;box-shadow:0 10px 25px rgba(0,0,0,0.08);position:relative;overflow:hidden;text-align:left;}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,0.12);}
.card img{width:100%;height:180px;object-fit:cover;border-radius:15px;margin-bottom:10px;}
.card h4{margin-bottom:5px;font-size:18px;}
.card p{font-size:14px;margin-bottom:5px;}
.card .preco{font-weight:700;}
.card .tele{font-size:13px;color:#555;}
.card .btn-card{background:#FF4FA3;color:#fff;padding:8px 18px;border-radius:20px;text-decoration:none;font-weight:600;transition:0.3s;display:inline-block;margin-top:10px;}
.card .btn-card:hover{background:#FFC300;color:#000;}
.promo-tag{position:absolute;top:10px;right:10px;background:red;color:#fff;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:700;animation:blink 1s infinite;}

/* MINIATURAS */
.variations{display:flex;gap:5px;margin-top:5px;}
.variations img{width:40px;height:40px;object-fit:cover;border-radius:5px;border:2px solid transparent;cursor:pointer;}
.variations img.selected{border-color:#FF4FA3;}

/* PROMOÇÕES SLIDER */
.promo-slider{display:flex;overflow-x:auto;gap:15px;padding:20px;}
.promo-card{min-width:200px;background:#FFC300;color:#000;border-radius:15px;padding:15px;flex-shrink:0;position:relative;}
.promo-card h4{margin-bottom:5px;}
.promo-card .btn-card{background:#FF4FA3;color:#fff;margin-top:10px;}
.promo-card .btn-card:hover{background:#FFC300;color:#000;}

/* CARRINHO */
#cart-button{position:fixed;bottom:20px;right:20px;background:#FF4FA3;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:30px;cursor:pointer;box-shadow:0 5px 15px rgba(0,0,0,0.3);transition:0.3s;z-index:999;}
#cart-button:hover{transform:scale(1.1);}
#cart-popup{position:fixed;bottom:90px;right:20px;width:320px;max-height:400px;background:#fff;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.25);overflow:auto;display:none;flex-direction:column;padding:15px;z-index:999;}
#cart-popup h3{text-align:center;color:#FF4FA3;margin-bottom:10px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding:5px;border-bottom:1px solid #eee;}
.cart-item img{width:50px;height:50px;object-fit:cover;border-radius:8px;margin-right:10px;}
.item-info{flex:1;}
.item-info p{margin:0;font-size:0.9rem;}
.quantity-controls{display:flex;align-items:center;gap:5px;margin-top:5px;}
.quantity-controls button{background:#FF6EC7;color:#fff;border:none;padding:2px 8px;border-radius:5px;cursor:pointer;font-weight:600;}
.send-cart{background:#25D366;color:#fff;text-align:center;padding:10px;border-radius:10px;font-weight:600;margin-top:10px;cursor:pointer;transition:0.2s;}
.send-cart:hover{background:#1EBE5B;}

/* FOOTER */
footer{background:#000;color:#fff;text-align:center;padding:25px;font-size:14px;margin-top:40px;}

/* ANIMAÇÕES */
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}
@media(max-width:768px){.produtos{flex-direction:column;align-items:center;}.card{width:90%;}.promo-slider{flex-direction:column;}}
</style>
</head>
<body>

<header>
    <div class="logo">LOJA MILANI</div>
    <p>MODA • COSTURA • PERFUMES</p>
</header>

<nav>
    <a href="#">Início</a>
    <a href="#">Coleções</a>
    <a href="#">Costura</a>
    <a href="#">Perfumes</a>
    <a href="#">Promoções</a>
    <a href="#">Contato</a>
</nav>

<!-- CARROSSEL -->
<div class="banner-carousel">
    <img src="https://images.unsplash.com/photo-1520975698512-8bfbfae7c3b2?crop=entropy&cs=tinysrgb&fit=max&h=400&w=1200" class="active">
    <img src="https://images.unsplash.com/photo-1593032465171-16d4c8c52a2b?crop=entropy&cs=tinysrgb&fit=max&h=400&w=1200">
    <img src="https://images.unsplash.com/photo-1589945554950-5d6e3bcf98e5?crop=entropy&cs=tinysrgb&fit=max&h=400&w=1200">
    <div class="banner-text">
        <h2>Moda que Encanta</h2>
        <p>Serviços de costura e perfumes exclusivos</p>
        <a href="https://wa.me/5551992921991" class="btn">Fale no WhatsApp</a>
    </div>
</div>

<!-- PRODUTOS -->
<section class="section">
    <h3>Produtos em Destaque</h3>
    <div class="produtos" id="product-list"></div>
</section>

<!-- PROMOÇÕES -->
<section class="section">
    <h3>Promoções Especiais</h3>
    <div class="promo-slider" id="promo-list"></div>
</section>

<!-- CARRINHO -->
<div id="cart-button" onclick="toggleCart()">🛒</div>
<div id="cart-popup">
    <h3>Seu Carrinho</h3>
    <div id="cart-items"></div>
    <div class="send-cart" onclick="sendCart()">Enviar WhatsApp</div>
</div>

<footer>
    © 2026 Loja Milani - Todos os direitos reservados
</footer>

<script>
// CARROSSEL
let banners=document.querySelectorAll('.banner-carousel img');
let current=0;
setInterval(()=>{
    banners[current].classList.remove('active');
    current=(current+1)%banners.length;
    banners[current].classList.add('active');
},4000);

// PRODUTOS
const products=[
    {name:"Vestido Midi Elegante",price:149.9,delivery:15,img:"https://images.unsplash.com/photo-1520975698512-8bfbfae7c3b2?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:true},
    {name:"Camiseta Masculina Slim",price:89.9,delivery:15,img:"https://images.unsplash.com/photo-1593032465171-16d4c8c52a2b?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:false},
    {name:"Perfume Exclusivo",price:219.9,delivery:15,img:"https://images.unsplash.com/photo-1589945554950-5d6e3bcf98e5?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:false},
    {name:"Blusa Feminina Estilosa",price:79.9,delivery:15,img:"https://images.unsplash.com/photo-1585386959984-a41552227a12?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:true},
    {name:"Jaqueta Masculina Casual",price:199.9,delivery:15,img:"https://images.unsplash.com/photo-1580716259205-2e7f2ec0e626?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:true},
    {name:"Saia Feminina Plissada",price:129.9,delivery:15,img:"https://images.unsplash.com/photo-1573231978090-f39d7b197b5b?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:false},
    {name:"Perfume Floral Feminino",price:179.9,delivery:15,img:"https://images.unsplash.com/photo-1567016546011-ef5f3a0bbdfb?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:true},
    {name:"Camisa Social Masculina",price:139.9,delivery:15,img:"https://images.unsplash.com/photo-1556905055-8f358a7a47b1?crop=entropy&cs=tinysrgb&fit=max&h=180&w=260",promo:false},
];

const productList=document.getElementById('product-list');
const promoList=document.getElementById('promo-list');
products.forEach(p=>{
    const card=document.createElement('div');
    card.className='card';
    if(p.promo) card.innerHTML+=`<div class="promo-tag">Promoção</div>`;
    card.innerHTML+=`
        <img src="${p.img}" alt="${p.name}">
        <h4>${p.name}</h4>
        <p>Descrição do produto</p>
        <p class="preco">R$ ${p.price.toFixed(2)}</p>
        <p class="tele">Tele entrega: R$ ${p.delivery.toFixed(2)}</p>
        <a href="#" class="btn-card" onclick="addToCart('${p.name}',${p.price},${p.delivery},'${p.img}')">Adicionar</a>
    `;
    productList.appendChild(card);

    if(p.promo){
        const promo=document.createElement('div');
        promo.className='promo-card';
        promo.innerHTML=`
            <h4>${p.name}</h4>
            <p>R$ ${p.price.toFixed(2)} + Tele R$ ${p.delivery.toFixed(2)}</p>
            <a href="#" class="btn-card" onclick="addToCart('${p.name}',${p.price},${p.delivery},'${p.img}')">Adicionar</a>
        `;
        promoList.appendChild(promo);
    }
});

// CARRINHO
let cart=[];
function addToCart(name,price,delivery,img){
    const existing=cart.find(item=>item.name===name);
    if(existing){existing.qty++;}
    else{cart.push({name,price,delivery,qty:1,img});}
    renderCart(); toggleCart(true);
}
function renderCart(){
    const cartDiv=document.getElementById('cart-items');
    cartDiv.innerHTML='';
    cart.forEach((item,i)=>{
        const div=document.createElement('div');
        div.className='cart-item';
        div.innerHTML=`
            <img src="${item.img}" alt="${item.name}">
            <div class="item-info">
                <p>${item.name}</p>
                <p>R$ ${item.price.toFixed(2)} + Tele R$ ${item.delivery.toFixed(2)}</p>
                <div class="quantity-controls">
                    <button onclick="changeQty(${i},-1)">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty(${i},1)">+</button>
                </div>
            </div>
        `;
        cartDiv.appendChild(div);
    });
}
function changeQty(i,val){
    cart[i].qty+=val;
    if(cart[i].qty<=0) cart.splice(i,1);
    renderCart();
}
function toggleCart(forceOpen=false){
    const popup=document.getElementById('cart-popup');
    if(forceOpen) popup.style.display='flex';
    else popup.style.display = popup.style.display==='flex'?'none':'flex';
}
function sendCart(){
    if(cart.length===0){ alert("Adicione produtos antes de enviar!"); return; }
    let msg="Olá! Quero comprar:\n";
    cart.forEach((item,i)=>{
        let total=(item.price+item.delivery)*item.qty;
        msg+=`${i+1}. ${item.name} - ${item.qty}x - Total: R$ ${total.toFixed(2)}\n`;
    });
    const url="https://wa.me/5551992921991?text="+encodeURIComponent(msg);
    window.open(url,'_blank');
}
</script>

</body>
</html>

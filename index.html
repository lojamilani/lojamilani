<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Milani</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#111 url('https://images.unsplash.com/photo-1600185366836-b99f4c84f748?crop=entropy&cs=tinysrgb&fit=crop&w=1400&q=80') no-repeat center center fixed;background-size:cover;color:#fff;}

/* HEADER */
header{background:rgba(0,0,0,0.8);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo img{height:50px;border-radius:12px;}
.logo-text{font-size:28px;font-weight:800;color:#FFC300;}

/* NAVIGATION */
nav{background:rgba(0,0,0,0.8);padding:12px;text-align:center;border-radius:12px;margin:10px;}
nav a{color:#fff;text-decoration:none;margin:0 12px;font-weight:600;position:relative;padding:8px 15px;border-radius:25px;transition:0.3s;background:#222;box-shadow:0 3px 6px rgba(0,0,0,0.3);}
nav a:hover{color:#000;background:#FFC300;}
.dropdown{position:relative;display:inline-block;}
.dropdown-content{display:none;position:absolute;background:#222;min-width:150px;box-shadow:0 8px 16px rgba(0,0,0,0.4);border-radius:12px;z-index:100;}
.dropdown-content a{color:#fff;padding:10px 15px;display:block;text-decoration:none;border-radius:8px;margin:2px 0;}
.dropdown-content a:hover{background:#FFC300;color:#000;}
.dropdown:hover .dropdown-content{display:block;}

/* SLIDER */
.slider{width:100%;max-height:450px;overflow:hidden;position:relative;margin:20px 0;border-radius:12px;}
.slide{display:none;width:100%;height:450px;background-size:cover;background-position:center;position:absolute;top:0;left:0;transition:all 1s ease;}
.slide.active{display:block;}
.slide-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);border-radius:12px;}
.slide-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;}
.slide-text h2{font-size:36px;font-weight:800;text-shadow:2px 2px 6px #000;margin-bottom:10px;}
.slide-text p{font-size:16px;text-shadow:1px 1px 6px #000;}
.slide-text .btn{background:#FFC300;color:#000;padding:12px 30px;border-radius:25px;text-decoration:none;font-weight:700;transition:0.3s;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
.slide-text .btn:hover{background:#fff;color:#000;cursor:pointer;}

/* SECTIONS */
.section{padding:30px 20px;text-align:center;background:rgba(0,0,0,0.6);border-radius:12px;margin:20px;}
.section h3{font-size:28px;margin-bottom:25px;font-weight:800;color:#FFC300;}
.produtos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;justify-items:center;}
.card{width:100%;padding:15px;border-radius:20px;background:#222;transition:0.3s;box-shadow:0 8px 25px rgba(0,0,0,0.5);position:relative;}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,0.7);}
.card img{width:100%;height:200px;object-fit:cover;border-radius:15px;margin-bottom:10px;}
.card h4{margin-bottom:5px;font-size:16px;color:#FFC300;}
.card p{font-size:14px;margin-bottom:5px;color:#fff;}
.card .preco{font-weight:700;font-size:15px;color:#FFC300;}
.card .btn-card{background:#FFC300;color:#000;padding:8px 20px;border-radius:25px;text-decoration:none;font-weight:600;transition:0.3s;display:inline-block;margin-top:5px;box-shadow:0 4px 8px rgba(0,0,0,0.5);}
.card .btn-card:hover{background:#fff;color:#000;cursor:pointer;}
.promo-tag{position:absolute;top:12px;right:12px;background:red;color:#fff;padding:5px 10px;border-radius:12px;font-size:12px;font-weight:700;animation:blink 1s infinite;}
.novo-tag{position:absolute;top:12px;left:12px;background:#FFC300;color:#000;padding:5px 10px;border-radius:12px;font-size:12px;font-weight:700;animation:blink 1s infinite;}

/* CARRINHO */
#cart-button{position:fixed;bottom:20px;right:20px;background:#FFC300;color:#000;width:55px;height:55px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:26px;cursor:pointer;box-shadow:0 5px 15px rgba(0,0,0,0.5);transition:0.3s;z-index:999;}
#cart-button:hover{transform:scale(1.1);}
#cart-popup{position:fixed;bottom:85px;right:20px;width:320px;max-height:450px;background:#222;border-radius:20px;box-shadow:0 5px 25px rgba(0,0,0,0.7);overflow:auto;display:none;flex-direction:column;padding:15px;z-index:999;}
#cart-popup h3{text-align:center;color:#FFC300;margin-bottom:10px;}
.cart-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:5px;border-bottom:1px solid #333;}
.cart-item img{width:50px;height:50px;object-fit:cover;border-radius:8px;margin-right:8px;}
.item-info{flex:1;}
.item-info p{margin:0;font-size:0.8rem;color:#fff;}
.quantity-controls{display:flex;align-items:center;gap:5px;margin-top:3px;}
.quantity-controls button{background:#FFC300;color:#000;border:none;padding:2px 6px;border-radius:6px;cursor:pointer;font-weight:700;}
.send-cart{background:#25D366;color:#fff;text-align:center;padding:10px;border-radius:15px;font-weight:700;margin-top:10px;cursor:pointer;transition:0.2s;}
.send-cart:hover{background:#1EBE5B;}

/* FOOTER */
footer{background:rgba(0,0,0,0.9);color:#fff;text-align:center;padding:20px;font-size:13px;margin-top:30px;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}
@media(max-width:768px){.produtos{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));}.card{width:95%;}}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="https://images.unsplash.com/photo-1600185366836-b99f4c84f748?crop=entropy&cs=tinysrgb&fit=crop&w=150&q=80" alt="Logo Milani"></div>
  <div class="logo-text">LOJA MILANI</div>
</header>

<nav>
  <a onclick="filterProducts('all')">Início</a>
  <div class="dropdown">
    <a>Roupas ▼</a>
    <div class="dropdown-content">
      <a onclick="filterProducts('Masculino')">Masculino</a>
      <a onclick="filterProducts('Feminino')">Feminino</a>
      <a onclick="filterProducts('Infantil')">Infantil</a>
    </div>
  </div>
  <div class="dropdown">
    <a>Perfumaria ▼</a>
    <div class="dropdown-content">
      <a onclick="filterProducts('AVON')">AVON</a>
      <a onclick="filterProducts('NATURA')">NATURA</a>
      <a onclick="filterProducts('MARY KAY')">MARY KAY</a>
    </div>
  </div>
  <a onclick="filterProducts('Promoção')">Promoção</a>
  <a onclick="filterProducts('Contato')">Contato</a>
  <a onclick="filterProducts('Costura')">Reforma de Costura</a>
</nav>

<section class="section" id="colecoes">
  <h3>Produtos em Destaque</h3>
  <div class="produtos" id="product-list"></div>
</section>

<div id="cart-button" onclick="toggleCart()">🛒</div>
<div id="cart-popup">
  <h3>Seu Carrinho</h3>
  <div id="cart-items"></div>
  <div class="send-cart" onclick="sendCart()">Enviar WhatsApp</div>
</div>

<footer>© 2026 Loja Milani - Todos os direitos reservados</footer>

<script>
// PRODUTOS
const products=[
  {name:"Vestido Feminino",category:"Feminino",price:149.9,img:"https://images.unsplash.com/photo-1520975698512-8bfbfae7c3b2?crop=entropy&cs=tinysrgb&fit=crop&w=260&q=80",promo:true,novo:true},
  {name:"Camiseta Masculina",category:"Masculino",price:89.9,img:"https://images.unsplash.com/photo-1593032465171-16d4c8c52a2b?crop=entropy&cs=tinysrgb&fit=crop&w=260&q=80",promo:true,novo:false},
  {name:"Conjunto Infantil Menina",category:"Infantil",price:129.9,img:"https://images.unsplash.com/photo-1591368810077-1c0c32f7b158?crop=entropy&cs=tinysrgb&fit=crop&w=260&q=80",promo:true,novo:true},
  {name:"Perfume AVON",category:"AVON",price:219.9,img:"https://images.unsplash.com/photo-1589945554950-5d6e3bcf98e5?crop=entropy&cs=tinysrgb&fit=crop&w=260&q=80",promo:true,novo:true},
  {name:"Perfume NATURA",category:"NATURA",price:199.9,img:"https://images.unsplash.com/photo-1612349316835-1c0736b5e42f?crop=entropy&cs=tinysrgb&fit=crop&w=260&q=80",promo:false,novo:true},
  {name:"Perfume MARY KAY",category:"MARY KAY",price:249.9,img:"https://images.unsplash.com/photo-1585657310238-36c91d5a89ff?crop=entropy&cs=tinysrgb&fit=crop&w=260&q=80",promo:true,novo:true},
];

const productList=document.getElementById('product-list');
function renderProducts(filter='all'){
  productList.innerHTML='';
  products.forEach(p=>{
    if(filter==='all'||filter===p.category||(filter==='Promoção'&&p.promo)){
      const card=document.createElement('div');
      card.className='card';
      if(p.promo) card.innerHTML+=`<div class="promo-tag">Promoção</div>`;
      if(p.novo) card.innerHTML+=`<div class="novo-tag">Novo</div>`;
      card.innerHTML+=`
        <img src="${p.img}" alt="${p.name}">
        <h4>${p.name}</h4>
        <p>Categoria: ${p.category}</p>
        <p class="preco">R$ ${p.price.toFixed(2)}</p>
        <a href="#" class="btn-card" onclick="addToCart('${p.name}',${p.price},'${p.img}')">Adicionar</a>
      `;
      productList.appendChild(card);
    }
  });
}
renderProducts();
function filterProducts(category){renderProducts(category);}

// CARRINHO
let cart=[];
function addToCart(name,price,img){
  const existing=cart.find(item=>item.name===name);
  if(existing){existing.qty++;}
  else{cart.push({name,price,qty:1,img});}
  renderCart(); toggleCart(true);
}
function renderCart(){
  const cartDiv=document.getElementById('cart-items');
  cartDiv.innerHTML='';
  cart.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='cart-item';
    div.innerHTML=`
      <img src="${item.img}" alt="${item.name}">
      <div class="item-info">
        <p>${item.name}</p>
        <p>R$ ${item.price.toFixed(2)}</p>
        <div class="quantity-controls">
          <button onclick="changeQty(${i},-1)">-</button>
          <span>${item.qty}</span>
          <button onclick="changeQty(${i},1)">+</button>
        </div>
      </div>
    `;
    cartDiv.appendChild(div);
  });
}
function changeQty(i,val){cart[i].qty+=val;if(cart[i].qty<=0) cart.splice(i,1);renderCart();}
function toggleCart(forceOpen=false){const popup=document.getElementById('cart-popup');if(forceOpen) popup.style.display='flex';else popup.style.display = popup.style.display==='flex'?'none':'flex';}
function sendCart(){if(cart.length===0){alert("Adicione produtos antes de enviar!");return;}let msg="Olá! Quero comprar:\n";cart.forEach((item,i)=>{let total=item.price*item.qty;msg+=`${i+1}. ${item.name} - ${item.qty}x - Total: R$ ${total.toFixed(2)}\n`;});const url="https://wa.me/5551992921991?text="+encodeURIComponent(msg);window.open(url,'_blank');}
</script>

</body>
</html>
